name: ci
on: [push, pull_request]

env:
  GO_VERSION: "1.24"

jobs:
  # El bash es el ORÁCULO del contrato (archivado en legacy/ tras la paridad Go).
  # Se sigue lintando y corriendo para que el golden-diff Go↔bash tenga base.
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint
        run: shellcheck -S warning legacy/bin/ccp legacy/lib/paths.sh legacy/lib/profiles.sh legacy/lib/env.sh install.sh legacy/tests/run.sh || true
      - name: Syntax check
        run: bash -n legacy/bin/ccp && bash -n legacy/lib/paths.sh && bash -n legacy/lib/profiles.sh && bash -n legacy/lib/env.sh && bash -n install.sh
      - name: Oracle test suite (legacy bash)
        run: bash legacy/tests/run.sh

  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "Archivos sin gofmt:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
      - name: go test
        run: go test ./...

  go-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: darwin, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -o "dist/ccp-${{ matrix.goos }}-${{ matrix.goarch }}" ./cmd/ccp

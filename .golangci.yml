# golangci-lint v1.62.x — config del rewrite Go de ccp.
run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports

linters-settings:
  errcheck:
    # escribir a un io.Writer de presentación no necesita chequeo de error
    exclude-functions:
      - fmt.Fprint
      - fmt.Fprintf
      - fmt.Fprintln

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
